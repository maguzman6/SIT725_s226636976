<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sequential Calculator</title>
</head>

<body>
    <h1>Calculator</h1>
    <p>Select your calculator</p>
    <button id="calcBtn">Task Calculator</button>
    <button id="seqCalcBtn">Sequential Calculator</button>


    <script>
        document.getElementById('calcBtn').addEventListener('click', function () {
            window.location.href = '/calc.html';
        });

        document.getElementById('seqCalcBtn').addEventListener('click', function () {
            window.location.href = '/seqcalc.html';
        });
    </script>
</body>

</html>
